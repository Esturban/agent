name: 'dev → master PR'

on:
  push:
    branches:
      - dev

jobs:
  pull-request:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create or update PR dev → master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY="Automated PR: changes from \`dev\` ready for Esturban to review and merge to \`master\`."

          # Find any open PR from dev → master
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head dev --base master \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$PR_NUMBER" ]; then
            # PR already exists — just update it, never close it
            echo "✓ Updating existing PR #${PR_NUMBER}"
            gh pr edit "$PR_NUMBER" \
              --title "dev → master" \
              --body "$PR_BODY"
          else
            echo "✓ Creating new PR with Esturban as reviewer"
            gh pr create \
              --title "dev → master" \
              --body "$PR_BODY" \
              --reviewer "Esturban" \
              --base master \
              --head dev
          fi
